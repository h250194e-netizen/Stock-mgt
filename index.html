<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Warehouse Stock Management</title>
    <style>
        /* CSS Variables for theming */
        :root {
            --bg-color: #ffffff;
            --text-color: #222222;
            --container-bg: #f9f9f9;
            --table-header-bg: #e0e0e0;
            --table-row-bg: #ffffff;
            --table-row-alt-bg: #f2f2f2;
            --border-color: #dddddd;
            --primary-color: #007bff;
            --primary-text-color: #ffffff;
            --danger-color: #dc3545;
            --danger-text-color: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        .theme-dark {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --table-header-bg: #333333;
            --table-row-bg: #2a2a2a;
            --table-row-alt-bg: #242424;
            --border-color: #444444;
            --primary-color: #bb86fc;
            --primary-text-color: #000000;
            --danger-color: #cf6679;
            --danger-text-color: #000000;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        
        .theme-forest {
            --bg-color: #f1f8e9;
            --text-color: #3e2723;
            --container-bg: #e8f5e9;
            --table-header-bg: #a5d6a7;
            --table-row-bg: #ffffff;
            --table-row-alt-bg: #c8e6c9;
            --border-color: #a5d6a7;
            --primary-color: #4caf50;
            --primary-text-color: #ffffff;
            --danger-color: #ef5350;
            --danger-text-color: #ffffff;
            --shadow-color: rgba(62, 39, 35, 0.1);
        }

        .theme-ocean {
            --bg-color: #e1f5fe;
            --text-color: #01579b;
            --container-bg: #b3e5fc;
            --table-header-bg: #4fc3f7;
            --table-row-bg: #ffffff;
            --table-row-alt-bg: #81d4fa;
            --border-color: #29b6f6;
            --primary-color: #0288d1;
            --primary-text-color: #ffffff;
            --danger-color: #ff7043;
            --danger-text-color: #ffffff;
            --shadow-color: rgba(1, 87, 155, 0.1);
        }

        /* General Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        h1, h2 {
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background-color 0.3s;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-container, .theme-selector {
            flex: 1;
            min-width: 280px;
        }

        /* Form Styles */
        #add-item-form {
            display: grid;
            gap: 10px;
        }

        #add-item-form input, #add-item-form button, #theme-select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            font-size: 1rem;
            background-color: var(--table-row-bg);
            color: var(--text-color);
        }
        
        #add-item-form button {
            background-color: var(--primary-color);
            color: var(--primary-text-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        #add-item-form button:hover {
            opacity: 0.9;
        }

        /* Table Styles */
        #stock-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        #stock-table th, #stock-table td {
            padding: 12px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        #stock-table thead {
            background-color: var(--table-header-bg);
        }

        #stock-table tbody tr:nth-child(even) {
            background-color: var(--table-row-alt-bg);
        }
        
        #stock-table tbody tr {
            background-color: var(--table-row-bg);
        }
        
        .delete-btn {
            background-color: var(--danger-color);
            color: var(--danger-text-color);
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Warehouse Stock</h1>
        
        <div class="controls">
            <div class="form-container">
                <h2>Add New Item</h2>
                <form id="add-item-form">
                    <input type="text" id="item-name" placeholder="Item Name" required>
                    <input type="number" id="item-quantity" placeholder="Quantity" required min="0">
                    <input type="date" id="item-expiry" required>
                    <button type="submit">Add Item</button>
                </form>
            </div>
            
            <div class="theme-selector">
                <h2>Select Theme</h2>
                 <select id="theme-select">
                    <option value="default">Default Light</option>
                    <option value="theme-dark">Dark Mode</option>
                    <option value="theme-forest">Forest</option>
                    <option value="theme-ocean">Ocean</option>
                </select>
            </div>
        </div>

        <h2>Current Stock</h2>
        <table id="stock-table">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Expiry Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="stock-body">
                <!-- Stock items will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('add-item-form');
            const stockBody = document.getElementById('stock-body');
            const themeSelect = document.getElementById('theme-select');
            
            // Load stock from localStorage or use initial data
            let stock = JSON.parse(localStorage.getItem('warehouseStock')) || [
                { id: 1, name: 'Canned Beans', quantity: 150, expiry: '2027-12-31' },
                { id: 2, name: 'Pasta (bags)', quantity: 300, expiry: '2026-08-15' },
                { id: 3, name: 'Olive Oil (bottles)', quantity: 80, expiry: '2025-10-20' }
            ];

            // --- FUNCTIONS ---

            const saveStock = () => {
                localStorage.setItem('warehouseStock', JSON.stringify(stock));
            };

            const renderStock = () => {
                stockBody.innerHTML = ''; // Clear existing table rows
                if (stock.length === 0) {
                     stockBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No items in stock.</td></tr>';
                     return;
                }
                
                stock.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>${item.expiry}</td>
                        <td><button class="delete-btn" data-id="${item.id}">Delete</button></td>
                    `;
                    stockBody.appendChild(row);
                });
            };

            const addItem = (e) => {
                e.preventDefault();
                const name = document.getElementById('item-name').value;
                const quantity = document.getElementById('item-quantity').value;
                const expiry = document.getElementById('item-expiry').value;

                if (!name || !quantity || !expiry) {
                    alert('Please fill out all fields.');
                    return;
                }

                const newItem = {
                    id: Date.now(), // Simple unique ID
                    name: name,
                    quantity: parseInt(quantity),
                    expiry: expiry
                };

                stock.push(newItem);
                saveStock();
                renderStock();
                form.reset(); // Clear the form fields
            };

            const deleteItem = (id) => {
                stock = stock.filter(item => item.id !== id);
                saveStock();
                renderStock();
            };
            
            const changeTheme = (e) => {
                 document.body.className = e.target.value === 'default' ? '' : e.target.value;
                 localStorage.setItem('warehouseTheme', e.target.value);
            }

            // --- EVENT LISTENERS ---

            form.addEventListener('submit', addItem);

            // Use event delegation for delete buttons
            stockBody.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-btn')) {
                    const itemId = parseInt(e.target.getAttribute('data-id'));
                    if (confirm('Are you sure you want to delete this item?')) {
                        deleteItem(itemId);
                    }
                }
            });
            
            themeSelect.addEventListener('change', changeTheme);
            
            // --- INITIALIZATION ---
            
            // Load saved theme on start
            const savedTheme = localStorage.getItem('warehouseTheme') || 'default';
            themeSelect.value = savedTheme;
            if (savedTheme !== 'default') {
                document.body.classList.add(savedTheme);
            }

            // Initial render of the stock table
            renderStock();
        });
    </script>

</body>
</html>
